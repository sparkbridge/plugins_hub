<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCBE 服务器行为包/资源包管理</title>
    <style>
        :root {
            --sb3-primary: #3b82f6;
            --sb3-primary-hover: #2563eb;
            --sb3-bg: transparent;
            --sb3-border: #e2e8f0;
            --sb3-text-main: #1e293b;
            --sb3-text-secondary: #94a3b8;
            --sb3-card-radius: 12px;
            --sb3-btn-radius: 8px;
            --sb3-shadow: 0 2px 10px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 24px;
            background-color: var(--sb3-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--sb3-text-main);
            line-height: 1.5;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--sb3-text-main);
        }

        /* 上传区域 */
        .upload-card {
            border: 1px dashed var(--sb3-border);
            border-radius: var(--sb3-card-radius);
            padding: 32px;
            text-align: center;
            margin-bottom: 32px;
            box-shadow: var(--sb3-shadow);
            background: #ffffff;
        }

        .upload-title {
            font-size: 16px;
            margin-bottom: 16px;
            color: var(--sb3-text-main);
        }

        .upload-input {
            display: none;
        }

        .upload-btn {
            display: inline-block;
            padding: 8px 24px;
            background-color: var(--sb3-primary);
            color: white;
            border-radius: var(--sb3-btn-radius);
            cursor: pointer;
            transition: background-color 0.2s;
            border: none;
            font-size: 14px;
        }

        .upload-btn:hover {
            background-color: var(--sb3-primary-hover);
        }

        .upload-tip {
            margin-top: 12px;
            font-size: 12px;
            color: var(--sb3-text-secondary);
        }

        /* 进度条区域 - 新增 */
        .progress-container {
            display: none;
            /* 默认隐藏 */
            margin: 20px 0;
            padding: 16px;
            background: #ffffff;
            border-radius: var(--sb3-card-radius);
            box-shadow: var(--sb3-shadow);
        }

        .progress-title {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--sb3-text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar-wrap {
            width: 100%;
            height: 8px;
            background: #f1f5f9;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--sb3-primary);
            border-radius: 4px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-percent {
            font-size: 12px;
            color: var(--sb3-text-secondary);
            margin-top: 8px;
            text-align: right;
        }

        /* 包列表区域 */
        .package-tabs {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--sb3-btn-radius);
            background: #f8fafc;
            color: var(--sb3-text-main);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--sb3-primary);
            color: white;
        }

        /* 横向卡片布局 */
        .package-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .package-card {
            display: flex;
            align-items: center;
            border-radius: var(--sb3-card-radius);
            box-shadow: var(--sb3-shadow);
            background: #ffffff;
            padding: 12px;
            transition: transform 0.2s;
            width: 100%;
        }

        .package-card:hover {
            transform: translateY(-1px);
        }

        .package-img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            background: #f8fafc;
            border-radius: 8px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .package-info {
            flex: 1;
            min-width: 0;
        }

        .package-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .package-uuid {
            font-size: 12px;
            color: var(--sb3-text-secondary);
            font-family: 'Fira Code', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .package-status {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-left: 16px;
            flex-shrink: 0;
        }

        .status-text {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .status-enabled {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        .status-disabled {
            background: rgba(156, 163, 175, 0.1);
            color: #9ca3af;
        }

        .toggle-btn {
            padding: 4px 12px;
            border: none;
            border-radius: var(--sb3-btn-radius);
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .toggle-enable {
            background: var(--sb3-primary);
            color: white;
        }

        .toggle-disable {
            background: #f8fafc;
            color: var(--sb3-text-main);
            border: 1px solid var(--sb3-border);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 48px 0;
            color: var(--sb3-text-secondary);
            font-size: 14px;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .package-card {
                flex-wrap: wrap;
            }

            .package-status {
                width: 100%;
                margin-left: 0;
                margin-top: 12px;
                justify-content: flex-start;
            }
        }
    </style>
</head>

<body>
    <h1 class="page-title">MCBE 服务器资源包/行为包管理</h1>

    <!-- 上传区域 -->
    <div class="upload-card">
        <h2 class="upload-title">上传资源包/行为包</h2>
        <input type="file" id="packageUpload" class="upload-input" accept=".mcpack,.zip">
        <label for="packageUpload" class="upload-btn">选择文件</label>
        <p class="upload-tip">支持 .mcpack / .zip / .mcaddon 格式，单个文件不超过 100MB</p>
    </div>

    <!-- 进度条区域 - 新增 -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-title">
            <span id="progressTask">正在初始化...</span>
            <span id="progressStatus">处理中</span>
        </div>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
    </div>

    <!-- 包列表区域 -->
    <div class="package-tabs">
        <button class="tab-btn active" data-type="resource">资源包</button>
        <button class="tab-btn" data-type="behavior">行为包</button>
    </div>

    <div class="package-list" id="packageList">
        <!-- 加载占位 -->
        <div class="loading">加载中...请稍候</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // ========== 全局提示 ==========
        function showNotice(msg, type = 'info') {
            if (window !== window.top) {
                window.parent.postMessage({
                    action: 'SHOW_NOTICE',
                    payload: { msg, type }
                }, '*');
            } else {
                alert(`[${type}] ${msg}`);
            }
        }

        // ========== Token 获取 ==========
        let sb3Token = '';
        function getSB3Token() {
            if (window === window.top) {
                // 调试模式：模拟 Token
                sb3Token = 'dev_token_123456';
                initPage();
                return;
            }

            // 发送 Token 请求
            window.parent.postMessage({ action: 'GET_SB3_TOKEN' }, '*');
            // 监听主应用返回的 Token
            window.addEventListener('message', (e) => {
                if (e.data.action === 'SB3_TOKEN') {
                    sb3Token = e.data.payload.token;
                    console.log('获取Token成功', sb3Token);
                    initPage()
                }
            });
        }

        // ========== 进度轮询相关变量 - 新增核心 ==========
        let progressTimer = null; // 轮询定时器
        const PROGRESS_INTERVAL = 1000; // 轮询间隔（1秒）
        const PROGRESS_API = '/api/plugin/packmgr/track'; // 进度接口地址

        // ========== 核心配置 ==========
        const API_CONFIG = {
            upload: '/api/plugin/packmgr/upload', // 替换为实际上传接口
            list: '/api/plugin/packmgr/list',     // 替换为实际列表接口
            toggle: '/api/plugin/packmgr/toggle', // 替换为实际启用/禁用接口
            progress: PROGRESS_API // 进度接口
        };

        let activeType = 'resource'; // 当前激活的标签类型

        // ========== 页面初始化 ==========
        function initPage() {
            // Axios 请求拦截器（Token 透传）
            axios.interceptors.request.use(config => {
                if (sb3Token) {
                    config.headers['Authorization'] = `Bearer ${sb3Token}`;
                }
                return config;
            });

            // Axios 响应拦截器（鉴权失败处理）
            axios.interceptors.response.use(
                response => response,
                error => {
                    if (error.response?.status === 403 || error.response?.status === 401) {
                        window.parent.postMessage({ action: 'TOKEN_EXPIRED' }, '*');
                        showNotice('登录状态失效，请重新登录', 'error');
                    }
                    return Promise.reject(error);
                }
            );

            // 绑定事件
            bindTabEvents();
            bindUploadEvent();
            // 加载包列表
            loadPackageList();
            // 初始化时检查一次进度（新增）
            checkProgressOnce();
        }

        // ========== 进度轮询核心函数 - 新增 ==========
        /**
         * 单次检查进度（初始化时调用）
         */
        async function checkProgressOnce() {
            try {
                const response = await axios.get(API_CONFIG.progress);
                const { status, percent, task } = response.data;

                // 如果有正在处理的任务，启动轮询
                if (status === 'processing') {
                    updateProgressUI(task, percent, status);
                    startProgressPolling();
                }
            } catch (error) {
                console.log('初始化检查进度失败（无任务或接口异常）：', error.message);
            }
        }

        /**
         * 启动进度轮询
         */
        function startProgressPolling() {
            // 先停止已有定时器，避免重复
            if (progressTimer) clearInterval(progressTimer);

            // 显示进度容器
            document.getElementById('progressContainer').style.display = 'block';

            // 启动轮询
            progressTimer = setInterval(async () => {
                await pollProgress();
            }, PROGRESS_INTERVAL);
        }

        /**
         * 停止进度轮询
         */
        function stopProgressPolling() {
            if (progressTimer) {
                clearInterval(progressTimer);
                progressTimer = null;
            }
            // 隐藏进度容器（成功/失败后保留5秒再隐藏）
            setTimeout(() => {
                document.getElementById('progressContainer').style.display = 'none';
            }, 5000);
        }

        /**
         * 轮询进度接口
         */
        async function pollProgress() {
            try {
                const response = await axios.get(API_CONFIG.progress);
                const { task, percent, status } = response.data;

                // 更新UI
                updateProgressUI(task, percent, status);

                // 根据状态处理
                switch (status) {
                    case 'processing':
                        // 处理中，继续轮询
                        break;
                    case 'success':
                        // 成功：停止轮询，提示，刷新列表
                        stopProgressPolling();
                        showNotice(task || '包处理完成！', 'success');
                        loadPackageList(); // 刷新包列表
                        break;
                    case 'error':
                        // 失败：停止轮询，提示错误
                        stopProgressPolling();
                        showNotice(task || '包处理失败！', 'error');
                        break;
                    case 'idle':
                        // 空闲：停止轮询
                        stopProgressPolling();
                        break;
                }
            } catch (error) {
                console.error('轮询进度失败：', error);
                stopProgressPolling();
                showNotice('进度查询失败，请刷新页面重试', 'error');
            }
        }

        /**
         * 更新进度UI
         * @param {string} task 任务描述
         * @param {number} percent 百分比
         * @param {string} status 状态
         */
        function updateProgressUI(task, percent, status) {
            const taskEl = document.getElementById('progressTask');
            const statusEl = document.getElementById('progressStatus');
            const barEl = document.getElementById('progressBar');
            const percentEl = document.getElementById('progressPercent');

            // 设置文本
            taskEl.textContent = task || '处理中...';
            statusEl.textContent = {
                'idle': '空闲',
                'processing': '处理中',
                'success': '成功',
                'error': '失败'
            }[status] || '未知状态';

            // 设置进度条
            const safePercent = Math.min(100, Math.max(0, percent || 0));
            barEl.style.width = `${safePercent}%`;
            percentEl.textContent = `${safePercent}%`;

            // 状态样式
            if (status === 'error') {
                barEl.style.background = '#ef4444'; // 红色
            } else if (status === 'success') {
                barEl.style.background = '#22c55e'; // 绿色
            } else {
                barEl.style.background =" var('--sb3-primary');" // 蓝色
            }
        }

        // ========== 标签切换事件 ==========
        function bindTabEvents() {
            const tabBtns = document.querySelectorAll('.tab-btn');
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    tabBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeType = btn.dataset.type;
                    loadPackageList();
                });
            });
        }

        // ========== 上传事件（新增启动轮询逻辑） ==========
        function bindUploadEvent() {
            const uploadInput = document.getElementById('packageUpload');
            uploadInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 文件类型验证
                const allowedTypes = ['.mcpack', '.zip','.mcaddon'];
                const fileExt = '.' + file.name.split('.').pop().toLowerCase();
                if (!allowedTypes.includes(fileExt)) {
                    showNotice('仅支持 .mcpack 或 .mcaddon格式文件', 'error');
                    uploadInput.value = '';
                    return;
                }

                // 构建上传表单
                const formData = new FormData();
                formData.append('file', file);
                formData.append('type', activeType);

                try {
                    showNotice('开始上传包，请稍候...', 'info');
                    // 上传开始时启动进度轮询（核心新增）
                    startProgressPolling();

                    const response = await axios.post(API_CONFIG.upload, formData, {
                        headers: { 'Content-Type': 'multipart/form-data' },
                        onUploadProgress: (progress) => {
                            const percent = Math.round((progress.loaded / progress.total) * 100);
                            // 上传阶段手动更新进度（后端处理前）
                            updateProgressUI(`正在上传文件...`, percent, 'processing');
                        }
                    });

                    if (!response.data.success) {
                        stopProgressPolling();
                        showNotice(`上传失败：${response.data.msg}`, 'error');
                        uploadInput.value = '';
                    }
                    // 上传成功后，由轮询接管进度更新
                } catch (error) {
                    stopProgressPolling();
                    showNotice(`上传出错：${error.message}`, 'error');
                    uploadInput.value = '';
                }
            });
        }

        // ========== 加载包列表 ==========
        async function loadPackageList() {
            const listContainer = document.getElementById('packageList');
            listContainer.innerHTML = '<div class="loading">加载中...请稍候</div>';

            try {
                const response = await axios.get(API_CONFIG.list, {
                    params: { type: activeType }
                });

                const packages = response.data.data || [];
                if (packages.length === 0) {
                    listContainer.innerHTML = '<div class="loading">暂无相关包数据</div>';
                    return;
                }

                // 渲染横向卡片列表
                listContainer.innerHTML = packages.map(pkg => `
                    <div class="package-card" data-id="${pkg.id}" data-uuid="${pkg.uuid}">
                        <!-- 左侧图片 -->
                        <img
                           src="https://th.bing.com/th/id/OIP.wo9ZeJZdRa7GZfMx3TgamgAAAA?w=108&h=108&c=1&bgcl=1e9433&r=0&o=7&dpr=1.3&pid=ImgRC&rm=3"
                           data-original="${pkg.cover || ''}" 
                            alt="${pkg.name}" 
                           class="package-img"
                          >
                        <!-- 中间名称+UUID -->
                        <div class="package-info">
                            <div class="package-name">${pkg.name}</div>
                            <div class="package-uuid">${pkg.uuid}</div>
                        </div>
                        <!-- 右侧状态+按钮 -->
                        <div class="package-status">
                            <span class="status-text ${pkg.enabled ? 'status-enabled' : 'status-disabled'}">
                                ${pkg.enabled ? '已启用' : '已禁用'}
                            </span>
                            <button 
                                class="toggle-btn ${pkg.enabled ? 'toggle-disable' : 'toggle-enable'}"
                                data-enabled="${pkg.enabled}"
                            >
                                ${pkg.enabled ? '禁用' : '启用'}
                            </button>
                        </div>
                    </div>
                `).join('');
                const imgElements = listContainer.querySelectorAll('.package-img');
                imgElements.forEach(async (imgEl) => {
                    const originalUrl = imgEl.dataset.original;
                    // 获取带 Token 的 Blob URL
                    const blobUrl = await getImageWithToken(originalUrl);
                    // 先清理旧的 Blob URL（如果有）
                    revokeImageBlobUrl(imgEl);
                    // 赋值新的 URL
                    imgEl.src = blobUrl;
                });

                // 绑定启用/禁用事件
                bindToggleEvents();
                // 调整iframe高度
                adjustIframeHeight();
            } catch (error) {
                listContainer.innerHTML = `<div class="loading">加载失败：${error.message}</div>`;
                showNotice(`加载列表失败：${error.message}`, 'error');
            }
        }

        // ========== 启用/禁用事件 ==========
        function bindToggleEvents() {
            const toggleBtns = document.querySelectorAll('.toggle-btn');
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', async () => {
                    const card = btn.closest('.package-card');
                    const pkgId = card.dataset.id;
                    const pkgUuid = card.dataset.uuid;
                    const currentEnabled = btn.dataset.enabled === 'true';
                    const targetEnabled = !currentEnabled;

                    try {
                        const response = await axios.post(API_CONFIG.toggle, {
                            id: pkgId,
                            uuid: pkgUuid,
                            type: activeType,
                            enabled: targetEnabled
                        });

                        if (response.data.success) {
                            showNotice(`包${targetEnabled ? '启用' : '禁用'}成功！`, 'success');
                            // 更新按钮状态
                            btn.dataset.enabled = targetEnabled;
                            btn.className = `toggle-btn ${targetEnabled ? 'toggle-disable' : 'toggle-enable'}`;
                            btn.textContent = targetEnabled ? '禁用' : '启用';
                            // 更新状态文本
                            const statusText = btn.parentElement.querySelector('.status-text');
                            statusText.className = `status-text ${targetEnabled ? 'status-enabled' : 'status-disabled'}`;
                            statusText.textContent = targetEnabled ? '已启用' : '已禁用';
                        } else {
                            showNotice(`操作失败：${response.data.msg}`, 'error');
                        }
                    } catch (error) {
                        showNotice(`操作出错：${error.message}`, 'error');
                    }
                });
            });
        }

        // ========== 调整iframe高度 ==========
        function adjustIframeHeight() {
            if (window === window.top) return;
            const height = document.body.scrollHeight;
            window.parent.postMessage({
                action: 'ADJUST_IFRAME_HEIGHT',
                payload: { height: height + 20 }
            }, '*');
        }

        // ========== 带 Token 加载图片的核心函数 ==========
            /**
             * 获取带 Token 验证的图片 Blob URL
             * @param {string} imgUrl 图片原始 URL
             * @returns {Promise<string>} Blob URL
             */
            async function getImageWithToken(imgUrl) {
                // 空URL/占位图直接返回
                if (!imgUrl || imgUrl.includes('placeholder')) {
                    return imgUrl;
                }

                try {
                    // 发起带 Token 的 GET 请求，获取二进制数据
                    const response = await axios.get(imgUrl, {
                        headers: {
                            'Authorization': `Bearer ${sb3Token}` // 携带 Token
                        },
                        responseType: 'blob' // 关键：指定响应类型为二进制 Blob
                    });

                    // 将 Blob 数据转为临时 URL
                    const blobUrl = URL.createObjectURL(response.data);
                    return blobUrl;
                } catch (error) {
                    console.error(`加载图片失败 ${imgUrl}：`, error);
                    // 失败时返回占位图
                    return 'https://via.placeholder.com/64x64?text=Img+Error';
                }
            }

            /**
             * 清理 Blob URL，避免内存泄漏
             * @param {HTMLImageElement} imgEl 图片元素
             */
            function revokeImageBlobUrl(imgEl) {
                if (imgEl && imgEl.src && imgEl.src.startsWith('blob:')) {
                    URL.revokeObjectURL(imgEl.src);
                }
            }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', getSB3Token);

        // 页面卸载时清理定时器（新增）
        // window.addEventListener('beforeunload', () => {
        //     stopProgressPolling();
        // });
        window.addEventListener('beforeunload', () => {
                stopProgressPolling();
                // 清理所有图片的 Blob URL
                document.querySelectorAll('.package-img').forEach(imgEl => {
                    revokeImageBlobUrl(imgEl);
                });
            });
    </script>
</body>

</html>
